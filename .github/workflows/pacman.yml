name: Generate Pac-Man

# Regenerates the contribution-grid Pac-Man animation
# Runs every 12 hours and on every push to main, plus manually
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Generate contribution Pac-Man SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: arpan-s-dev

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
