<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="580" viewBox="0 0 1100 580">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="30%" stop-color="#161b22"/>
      <stop offset="70%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <radialGradient id="glow1" cx="15%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#ff79c6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#50fa7b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e2e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#13162a" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="50%" stop-color="#ff79c6"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>

    <!-- ANIMATED SWEEPING GRADIENT for accent bar -->
    <linearGradient id="sweepBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#ff79c6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#50fa7b" stop-opacity="0.2"/>
      <animate attributeName="x1" values="-1;0;1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;1;2" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .bar-text { font-size: 13px; fill: #6272a4; }
      .name { font-size: 36px; font-weight: 800; fill: #f8f8f2; }
      .tagline { font-size: 14px; fill: #8be9fd; opacity: 0.9; font-style: italic; }
      .k { font-size: 14px; fill: #ff79c6; font-weight: 700; }
      .v { font-size: 14px; fill: #f8f8f2; }
      .section-hdr { font-size: 12px; fill: #6272a4; letter-spacing: 2.5px; font-weight: 700; }
      .stat-val { font-size: 26px; font-weight: 800; fill: #f8f8f2; }
      .stat-label { font-size: 11px; fill: #6272a4; letter-spacing: 1px; }
      .pill-text { font-size: 12px; fill: #f8f8f2; font-weight: 700; }
      .footer { font-size: 12px; fill: #44475a; font-style: italic; }
      .accent { fill: #bd93f9; }
      .highlight { font-size: 13px; fill: #50fa7b; font-weight: 700; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1100" height="580" rx="20" fill="url(#bg)"/>
  <rect x="0" y="0" width="1100" height="580" rx="20" fill="url(#glow1)"/>
  <rect x="0" y="0" width="1100" height="580" rx="20" fill="url(#glow2)"/>
  <rect x="0" y="0" width="1100" height="580" rx="20" fill="url(#glow3)"/>

  <!-- ANIMATED PARTICLES (floating dots) -->
  <g opacity="0.5">
    <circle cx="120" cy="380" r="1.5" fill="#bd93f9">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="380;370;380" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="460" r="1" fill="#ff79c6">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="460;450;460" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="120" r="1.5" fill="#50fa7b">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;108;120" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="500" r="1" fill="#8be9fd">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="500;490;500" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="340" r="1" fill="#f1fa8c">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="340;330;340" dur="7.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="510" r="1.2" fill="#bd93f9">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="510;500;510" dur="6.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="1099" height="579" rx="20" fill="none" stroke="#30363d" stroke-opacity="0.5"/>

  <!-- Terminal bar -->
  <rect x="0" y="0" width="1100" height="42" rx="20" fill="#161b22"/>
  <rect x="0" y="20" width="1100" height="22" fill="#161b22"/>
  <line x1="0" y1="42" x2="1100" y2="42" stroke="#30363d" stroke-opacity="0.4"/>
  <circle cx="26" cy="21" r="6" fill="#ff5555"/>
  <circle cx="46" cy="21" r="6" fill="#f1fa8c"/>
  <circle cx="66" cy="21" r="6" fill="#50fa7b"/>
  <text x="550" y="26" text-anchor="middle" class="mono bar-text">arpanjeet@dev ~ dashboard.sh — zsh — 140×44</text>

  <!-- ANIMATED accent bar under terminal -->
  <rect x="0" y="42" width="1100" height="2" fill="url(#sweepBar)" opacity="0.85"/>

  <!-- LEFT COLUMN -->
  <g transform="translate(40, 68)">
    <!-- Name -->
    <text x="0" y="28" class="mono name">Arpanjeet Singh</text>

    <!-- Divider -->
    <line x1="0" y1="68" x2="460" y2="68" stroke="#30363d" stroke-opacity="0.4"/>

    <!-- Info block -->
    <g transform="translate(0, 88)">
      <text x="0" y="0" class="mono k">→ school</text>
      <text x="100" y="0" class="mono v">SJSU — B.S. Computer Science (Junior)</text>

      <text x="0" y="26" class="mono k">→ stack</text>
      <text x="100" y="26" class="mono v">Python • Java • TypeScript</text>

      <text x="0" y="52" class="mono k">→ focus</text>
      <text x="100" y="52" class="mono v">AI Engineering • Multi-Agent • Low-Level</text>

      <text x="0" y="78" class="mono k">→ tools</text>
      <text x="100" y="78" class="mono v">React Native • Jira • LLMs • Agents</text>

      <text x="0" y="104" class="mono k">→ editor</text>
      <text x="100" y="104" class="mono v">VS Code + Cursor • Dracula Pro</text>

      <text x="0" y="130" class="mono k">→ status</text>
      <text x="100" y="130" class="mono v">Catching up. Outrunning. Again.</text>
    </g>

    <!-- Badges row -->
    <g transform="translate(0, 248)">
      <!-- Scale badge -->
      <rect x="0" y="0" width="200" height="32" rx="16" fill="#50fa7b" fill-opacity="0.1" stroke="#50fa7b" stroke-opacity="0.4"/>
      <text x="14" y="21" class="mono pill-text" fill="#50fa7b">Junior @ SJSU CS</text>

      <!-- Bay Area badge -->
      <rect x="212" y="0" width="200" height="32" rx="16" fill="#f1fa8c" fill-opacity="0.1" stroke="#f1fa8c" stroke-opacity="0.4"/>
      <text x="226" y="21" class="mono pill-text" fill="#f1fa8c">SF Bay Area</text>
    </g>

    <g transform="translate(0, 290)">
      <!-- Available badge with PULSING dot -->
      <rect x="0" y="0" width="200" height="32" rx="16" fill="#8be9fd" fill-opacity="0.1" stroke="#8be9fd" stroke-opacity="0.4"/>
      <circle cx="16" cy="16" r="4" fill="#8be9fd">
        <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="r" values="4;5.5;4" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <text x="28" y="21" class="mono pill-text" fill="#8be9fd">Open to Opportunities</text>

      <!-- Night coder -->
      <rect x="212" y="0" width="195" height="32" rx="16" fill="#bd93f9" fill-opacity="0.1" stroke="#bd93f9" stroke-opacity="0.4"/>
      <text x="226" y="21" class="mono pill-text" fill="#bd93f9">Outrunning the AI Race</text>
    </g>
  </g>

  <!-- RIGHT COLUMN -->
  <g transform="translate(540, 68)">
    <text x="0" y="14" class="mono section-hdr">STATS</text>

    <!-- Stats card -->
    <rect x="0" y="26" width="520" height="170" rx="14" fill="url(#cardGrad)" stroke="#30363d" stroke-opacity="0.4"/>

    <!-- Row 1 - with subtle FADE-IN animation -->
    <g transform="translate(32, 58)">
      <text x="0" y="0" class="mono stat-label">REPOS</text>
      <text x="0" y="30" class="mono stat-val" fill="#bd93f9" filter="url(#glow-filter)">
        20+
        <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
      </text>
    </g>
    <g transform="translate(142, 58)">
      <text x="0" y="0" class="mono stat-label">YEAR</text>
      <text x="0" y="30" class="mono stat-val" fill="#50fa7b" filter="url(#glow-filter)">
        2026
        <animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/>
      </text>
    </g>
    <g transform="translate(272, 58)">
      <text x="0" y="0" class="mono stat-label">FOCUS</text>
      <text x="0" y="30" class="mono stat-val" fill="#f1fa8c" filter="url(#glow-filter)">AI</text>
    </g>
    <g transform="translate(372, 58)">
      <text x="0" y="0" class="mono stat-label">LEVEL</text>
      <text x="0" y="30" class="mono stat-val" fill="#ff79c6" filter="url(#glow-filter)">Jr</text>
    </g>

    <!-- Divider -->
    <line x1="32" y1="106" x2="488" y2="106" stroke="#30363d" stroke-opacity="0.25"/>

    <!-- Row 2 -->
    <g transform="translate(32, 122)">
      <text x="0" y="0" class="mono stat-label">TOP LANG</text>
      <text x="0" y="30" class="mono stat-val" fill="#bd93f9" filter="url(#glow-filter)">Python</text>
    </g>
    <g transform="translate(182, 122)">
      <text x="0" y="0" class="mono stat-label">SCHOOL</text>
      <text x="0" y="30" class="mono stat-val" fill="#8be9fd" filter="url(#glow-filter)">SJSU</text>
    </g>
    <g transform="translate(292, 122)">
      <text x="0" y="0" class="mono stat-label">MODE</text>
      <text x="0" y="30" class="mono stat-val" fill="#50fa7b" filter="url(#glow-filter)">BUILD</text>
    </g>
    <g transform="translate(422, 122)">
      <text x="0" y="0" class="mono stat-label">STATUS</text>
      <text x="0" y="30" class="mono stat-val" fill="#f1fa8c" filter="url(#glow-filter)">LIVE</text>
    </g>

    <!-- SPECIALIZATIONS section -->
    <text x="0" y="228" class="mono section-hdr">SPECIALIZATIONS</text>

    <rect x="0" y="240" width="520" height="100" rx="14" fill="url(#cardGrad)" stroke="#30363d" stroke-opacity="0.4"/>

    <!-- Specialization pills - Row 1 -->
    <g transform="translate(20, 262)">
      <rect x="0" y="0" width="155" height="28" rx="14" fill="#bd93f9" fill-opacity="0.12" stroke="#bd93f9" stroke-opacity="0.4"/>
      <text x="12" y="19" class="mono pill-text" fill="#bd93f9">AI Engineering</text>

      <rect x="165" y="0" width="140" height="28" rx="14" fill="#ff79c6" fill-opacity="0.12" stroke="#ff79c6" stroke-opacity="0.4"/>
      <text x="177" y="19" class="mono pill-text" fill="#ff79c6">Multi-Agent</text>

      <rect x="315" y="0" width="115" height="28" rx="14" fill="#50fa7b" fill-opacity="0.12" stroke="#50fa7b" stroke-opacity="0.4"/>
      <text x="327" y="19" class="mono pill-text" fill="#50fa7b">Low-Level</text>

      <rect x="440" y="0" width="60" height="28" rx="14" fill="#8be9fd" fill-opacity="0.12" stroke="#8be9fd" stroke-opacity="0.4"/>
      <text x="452" y="19" class="mono pill-text" fill="#8be9fd">RAG</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(20, 298)">
      <rect x="0" y="0" width="125" height="28" rx="14" fill="#f1fa8c" fill-opacity="0.12" stroke="#f1fa8c" stroke-opacity="0.4"/>
      <text x="12" y="19" class="mono pill-text" fill="#f1fa8c">React Native</text>

      <rect x="135" y="0" width="100" height="28" rx="14" fill="#ff5555" fill-opacity="0.12" stroke="#ff5555" stroke-opacity="0.4"/>
      <text x="147" y="19" class="mono pill-text" fill="#ff5555">Systems</text>

      <rect x="245" y="0" width="80" height="28" rx="14" fill="#bd93f9" fill-opacity="0.12" stroke="#bd93f9" stroke-opacity="0.4"/>
      <text x="257" y="19" class="mono pill-text" fill="#bd93f9">LLMs</text>

      <rect x="335" y="0" width="90" height="28" rx="14" fill="#ff79c6" fill-opacity="0.12" stroke="#ff79c6" stroke-opacity="0.4"/>
      <text x="347" y="19" class="mono pill-text" fill="#ff79c6">Agents</text>

      <rect x="435" y="0" width="65" height="28" rx="14" fill="#50fa7b" fill-opacity="0.12" stroke="#50fa7b" stroke-opacity="0.4"/>
      <text x="447" y="19" class="mono pill-text" fill="#50fa7b">Jira</text>
    </g>

    <!-- LANGUAGES bar section -->
    <text x="0" y="378" class="mono section-hdr">LANGUAGES</text>

    <rect x="0" y="390" width="520" height="68" rx="14" fill="url(#cardGrad)" stroke="#30363d" stroke-opacity="0.4"/>

    <!-- Progress bar - ANIMATED FILL -->
    <rect x="20" y="410" width="480" height="8" rx="4" fill="#21222c"/>
    <rect x="20" y="410" width="0" height="8" rx="4" fill="#bd93f9">
      <animate attributeName="width" from="0" to="200" dur="1.4s" fill="freeze"/>
    </rect>
    <rect x="220" y="410" width="0" height="8" rx="4" fill="#50fa7b">
      <animate attributeName="width" from="0" to="130" dur="1.4s" begin="0.2s" fill="freeze"/>
    </rect>
    <rect x="350" y="410" width="0" height="8" rx="4" fill="#ff79c6">
      <animate attributeName="width" from="0" to="100" dur="1.4s" begin="0.4s" fill="freeze"/>
    </rect>
    <rect x="450" y="410" width="0" height="8" rx="4" fill="#f1fa8c">
      <animate attributeName="width" from="0" to="50" dur="1.4s" begin="0.6s" fill="freeze"/>
    </rect>

    <!-- Labels -->
    <text x="120" y="440" class="mono" font-size="10" fill="#bd93f9" text-anchor="middle">Python</text>
    <text x="285" y="440" class="mono" font-size="10" fill="#50fa7b" text-anchor="middle">Java</text>
    <text x="400" y="440" class="mono" font-size="10" fill="#ff79c6" text-anchor="middle">TypeScript</text>
    <text x="475" y="440" class="mono" font-size="10" fill="#f1fa8c" text-anchor="middle">SQL</text>
  </g>

  <!-- Footer -->
  <g transform="translate(0, 550)">
    <line x1="40" y1="0" x2="1060" y2="0" stroke="#30363d" stroke-opacity="0.25"/>
    <text x="550" y="20" text-anchor="middle" class="mono footer">"Everything goes stale. So do I. So I rebuild." — arpanjeet@dev</text>
  </g>
</svg>
